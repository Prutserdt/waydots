########################################################
### Hyprland configuration file, created by Prutserd ###
########################################################

################
### MONITORS ###
################

monitor=,preferred,auto,auto

#################
### AUTOSTART ###
#################

exec-once = nm-applet &
exec-once = waybar
exec-once = hyprpaper
exec-once = syncthing
exec-once = emacs --daemon
exec-once = wl-paste --type text --watch cliphist store #Stores only text data
exec-once = wl-paste --type image --watch cliphist store #Stores only image data
exec-once = hyprsunset
#exec-once = "kanata --config /home/icefly/.config/kanata/config.toml &"
exec-once = "kanata"

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 0
    gaps_out = 0

    border_size = 2
    #col.active_border = rgba(FF0000ff)
    col.active_border = rgba(D25708ee)
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    allow_tearing = false

    layout = master    #alternatives: monocle and scrolling
}

decoration {
    rounding = 1
    rounding_power = 2

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # blur {
    #     enabled = true
    #     size = 3
    #     passes = 1

    #     vibrancy = 0.1696
    blur {
        enabled = false
    }
}

animations {
    enabled = 0
}

dwindle {
    pseudotile = true # Master switch for pseudotiling.
    preserve_split = true
}

# Use this only ultrawide screens. For laptops uncomment this section.
# NOTE: this conf cannot conditional configuration like hostname dependent settings
#       It is possible with additional conf files and symlinks, but way to complicated
#       right now. See  https://jumptuck.com/blog/2025-05-26-hyprland-conditional-config/
master {
     new_status = master
     orientation = center
     slave_count_for_center_master = 0
     new_status = slave
     always_keep_position = true
     mfact = 0.4
}

misc {
#force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
    vfr = true # Lower the amount of sent frames when nothing is happening on-screen
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    repeat_rate = 50
    repeat_delay = 180
    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# FIXME: onderstaande werkt niet lijkt het
windowrule {
    name = maximize-brave
    match:class = brave-browser

    # Override maximize behavior to fit current screen size
    suppress_event = maximize
}

# Set new applications to open in slave mode
focus rule = [app="*"] slave

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule {
  name = opacity-emacs
  match:class = Emacs
 
  opacity = 0.9
}

##################################
### KEYBINDINGS: WINDOWMANAGER ###
##################################
# NOTE: I am using SUPER_R for most of my binds.
#       On my keyboard SUPER_L and SUPER_R is present.
#       By using setting SUPER_R both SUPER_L and SUPER_R can be used.

# Make selected window the master
bind = SUPER_R, space, layoutmsg, swapwithmaster 

# Open the terminal
bind = SUPER_R, return, exec, alacritty

# Kill the active window, and treat emacs as a special case make sure the daemon keeps running and use emacsclient, see script for details
#binds = SUPER_R, Q, killactive
bind = SUPER_R, Q, exec, ~/.config/close_window.sh

# Toggle floating
bind = SUPER_R, T, togglefloating

bind = SUPER_R, B, exec, pkill waybar || waybar

#binds = SUPER_R, L,  FIXME: I need a screenlocker...


# Cycle to the next/previous window on the workspace. Only for master and monocle layouts.
bind = SUPER_R, j, layoutmsg,  cyclenext
bind = SUPER_R, k, layoutmsg, cycleprev
# Cycle in scrolling layout
bind = SUPER_R, comma, layoutmsg, move -col
bind = SUPER_R, period, layoutmsg, move +col

# Move windows through the stack on the workspace
bind = SUPER_R SHIFT, H, movewindow, left
bind = SUPER_R SHIFT, L, movewindow, right
bind = SUPER_R SHIFT, K, movewindow, up
bind = SUPER_R SHIFT, J, movewindow, down

# Switch layouts
bind = SUPER_R, y, exec, hyprctl keyword general:layout "dwindle"
bind = SUPER_R, u, exec, hyprctl keyword general:layout "master"
bind = SUPER_R, i, exec, hyprctl keyword general:layout "monocle"
bind = SUPER_R, o, exec, hyprctl keyword general:layout "scrolling"

# Toggle fullscreen
bind = SUPER_R, M, fullscreen, 1
bind = SUPER_R, F, fullscreen, 0

# Switch workspaces with SUPER_L + [0-9]
bind = SUPER_R, 1, workspace, 1
bind = SUPER_R, 2, workspace, 2
bind = SUPER_R, 3, workspace, 3
bind = SUPER_R, 4, workspace, 4
bind = SUPER_R, 5, workspace, 5

# Move active window to a workspace with SUPER_L + SHIFT + [#]
bind = SUPER_R SHIFT, 1, movetoworkspace, 1
bind = SUPER_R SHIFT, 2, movetoworkspace, 2
bind = SUPER_R SHIFT, 4, movetoworkspace, 4
bind = SUPER_R SHIFT, 5, movetoworkspace, 5

# Resize the actice window withSUPER_L + shift and vim keys
bind = SUPER_R CTRL, h, resizeactive, -20 0
bind = SUPER_R CTRL, l, resizeactive, 20 0
bind = SUPER_R CTRL, k, resizeactive, 0 -20
bind = SUPER_R CTRL, j, resizeactive, 0 20

# Move/resize windows with SUPER_L + LMB/RMB and dragging
bindm = SUPER_R, mouse:272, movewindow
bindm = SUPER_R, mouse:273, resizewindow

################################
### KEYBINDNGS: APPLICATIONS ###
################################

# Super + CTRL + SHIFT 

bind = SUPER_R CTRL SHIFT, E, exec, ~/.config/open_emacs.sh
bind = SUPER_R CTRL SHIFT, G, exec, gimp
bind = SUPER_R CTRL SHIFT, M, exec, mousepad
bind = SUPER_R CTRL SHIFT, P, exec, keepass ~/stack/WoordenInDeWacht/wachtwoorden.kdbx
bind = SUPER_R CTRL SHIFT, T, exec, pcmanfm

#########################
### KEYBINDINGS: ROFI ###
#########################

# Super + CTRL 

bind = SUPER_R CTRL, DELETE, exec, ~/.config/rofi/rofi_delete_process.sh
bind = SUPER_R CTRL, B, exec, ~/.config/rofi/rofi_internet_bookmarks.sh
bind = SUPER_R CTRL, D, exec, ~/.config/rofi/rofi_app_launcher.sh
# Update the list of application on my system. Used in rofi_app_laucher.sh
bind = SUPER_R SHIFT, D, exec, ~/stack/Code/rust/test/app_list_creator
#bind = SUPER_R SHIFT, D, exec, ~/stack/rofi/app_list_update 
bind = SUPER_R CTRL, M, exec, ~/.config/rofi/rofi_drive_mounter.sh
bind = SUPER_R CTRL, S, exec, ~/.config/rofi/rofi_monitor_selector.sh
bind = SUPER_R CTRL, V, exec, ~/.config/rofi/rofi_clipboard_manager.sh
bind = SUPER_R CTRL, W, exec, ~/.config/rofi/rofi_wallpaper_selector.sh

bind = SUPER_R CTRL, Q, exec, ~/.config/rofi/rofi_exit_hyprland.sh

###############################
### KEYBINDINGS: MULTIMEDIA ###
###############################

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bind = , XF86Calculator, exec, [float] qalculate-gtk

# Control the audio. This requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Change the color intensity of the sccreen
bindel = ,XF86MonBrightnessDown, exec, hyprctl hyprsunset gamma -10
bindel = ,XF86MonBrightnessUp, exec, hyprctl hyprsunset gamma +10
bindel = ,XF86Launch9, exec, hyprctl hyprsunset gamma 100

# Screenshot an area and save to Downloads
bind = , PRINT, exec, sh -c 'xfce4-screenshooter -r -s "$HOME/Downloads"'

# Screenshot conversion to text in the clipboard.
bind = SHIFT, PRINT, exec, ~/.config/screenshot2text.sh

